<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/stashpot-logo.png" />
    <link rel="apple-touch-icon" href="/stashpot-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Primary SEO -->
    <title>StashPot — Save Without Losing | Prize Savings on Solana</title>
    <meta
      name="description"
      content="StashPot is a savings protocol on Solana. Deposit USDC, earn yield from leading DeFi platforms, and enter weekly prize draws funded entirely by that yield. Inheritance and escrow vaults via TimeLockr. Local fiat on ramps for Nigeria, Ghana, Kenya, and South Africa."
    />
    <meta
      name="keywords"
      content="Solana, savings, prize savings, no loss, USDC, DeFi, Kamino, Marginfi, Drift, Save Protocol, Yellow Card, Transak, Africa fintech, Naira, Cedi, Shilling, Rand"
    />
    <meta name="author" content="StashPot" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://stashpot.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stashpot.io/" />
    <meta property="og:title" content="StashPot — Save Without Losing" />
    <meta property="og:description" content="Earn interest. Win prizes. Keep your savings safe. A savings app on Solana." />
    <meta property="og:image" content="https://stashpot.io/stashpot-logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="StashPot" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://stashpot.io/" />
    <meta name="twitter:title" content="StashPot — Save Without Losing" />
    <meta name="twitter:description" content="Earn interest. Win prizes. Keep your savings safe. A savings app on Solana." />
    <meta name="twitter:image" content="https://stashpot.io/stashpot-logo.png" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://cdn.simpleicons.org" crossorigin />

    <!-- Inter + JetBrains Mono -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- AOS animations CSS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "StashPot",
        "url": "https://stashpot.io",
        "logo": "https://stashpot.io/stashpot-logo.png",
        "description": "A savings app on Solana with prize linked rewards, group savings, and local money on ramps."
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "StashPot",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "description": "Earn interest on your USDC and get prize chances every week, all while your savings stay completely safe."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
